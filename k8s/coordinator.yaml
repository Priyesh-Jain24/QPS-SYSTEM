apiVersion: apps/v1
kind: Deployment
metadata:
  name: searchsphere-coordinator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: searchsphere-coordinator
  template:
    metadata:
      labels:
        app: searchsphere-coordinator
    spec:
      containers:
      - name: coordinator
        image: searchsphere-coordinator:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_ADDR
          value: "redis:6379"
        - name: ETCD_ENDPOINTS
          value: "etcd:2379"
        - name: OLLAMA_URL
          value: "http://ollama:11434"
---
apiVersion: v1
kind: Service
metadata:
  name: searchsphere-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: searchsphere-coordinator
